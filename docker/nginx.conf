user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;

  log_format app_json escape=json '{ "time":"$time_iso8601", "remote_addr":"$remote_addr", "request_method":"$request_method", "request_uri":"$request_uri", "status":$status, "body_bytes_sent":$body_bytes_sent, "request_time":"$request_time", "upstream_response_time":"$upstream_response_time" }';
  access_log /var/log/nginx/access.log app_json;
  error_log /var/log/nginx/error.log warn;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    location /api/health {
      proxy_pass http://app:3000;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "0" always;
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=30" always;
  }

  # HTTPS-ready configuration can be enabled by mounting certificate files
  # at /etc/nginx/certs/server.crt and /etc/nginx/certs/server.key.
}
