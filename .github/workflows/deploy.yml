name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build --workspace=frontend
      - name: Generate Prisma client
        run: npx prisma generate --schema=frontend/prisma/schema.prisma
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: devops/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devmarket:latest
      - name: Deploy to server (ssh)
        if: ${{ secrets.DEPLOY_SSH_HOST }}
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devmarket:latest
            docker stop devmarket || true
            docker rm devmarket || true
            docker run -d --name devmarket --env-file /home/deploy/.env -p 80:3000 ${{ secrets.DOCKERHUB_USERNAME }}/devmarket:latest
